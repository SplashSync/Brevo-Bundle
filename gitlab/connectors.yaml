################################################################
# Include Pipeline Templates
include:
  - remote: 'https://raw.githubusercontent.com/BadPixxel/Php-Sdk/3.0/gitlab/php/defaults.yaml'
  - remote: 'https://raw.githubusercontent.com/BadPixxel/Php-Sdk/3.0/gitlab/pages.yaml'

################################################################
# Quality Tests
################################################################

################################################################################
# PHP 8.3
quality:php-8.3:
    extends:  .quality
    image:    registry.gitlab.com/badpixxel-projects/php-sdk:php-8.3

################################################################
# Functional Tests
################################################################

functional-brevo:
    extends:    .functional
    image:      registry.gitlab.com/badpixxel-projects/php-sdk:php-8.3
    needs:
        - job: docker:sandbox
          optional: true
    services:
        - name: $CI_REGISTRY_IMAGE:$CI_COMMIT_REF_SLUG
          alias: sandbox.open-api.local
    variables:
        SPLASH_SEQUENCE: "Brevo - Sandbox"
    ################################################################################
    # Run Test Script
    script:
        # Wait for OpenAPI Sandbox to Start
        - sleep 5
        - curl -f http://sandbox.open-api.local/ || true
        # Execute PhpUnit Tests
        - php vendor/bin/phpunit --log-junit $CI_PROJECT_DIR/full-report.xml
